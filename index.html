<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NurseQuiz - Study App</title>
    <link rel="stylesheet" href="style.css">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="container">
        
        <!-- START SCREEN -->
        <div id="start-screen" class="screen active">
            <h1><i class="fa-solid fa-user-nurse"></i> NurseQuiz</h1>
            <p>Master your nursing knowledge</p>
            <button id="start-btn">Start Quiz</button>
        </div>

        <!-- QUIZ SCREEN -->
        <div id="quiz-screen" class="screen">
            <div class="quiz-header">
                <!-- ... existing header ... -->
                </div>
            </div>
            
            <h2 id="question-text">Question goes here</h2>
            
            <!-- NEW:  Category label -->
            <div id="category-label" class="category-label"></div>
    
            <!-- NEW: Explanation box -->
            <div id="explanation-box" class="explanation-box"></div>

            <div id="answer-container" class="answers-container">
                <!-- Buttons injected by JS -->
            </div>

            <div class="progress-bar">
                <div id="progress" class="progress"></div>
            </div>
        </div>

        <!-- RESULT SCREEN -->
        <div id="result-screen" class="screen">
            <div id="result-info">
                <h1>Quiz Results</h1>
                <div class="result-info-box">
                    <p>You scored <span id="final-score">0</span> out of <span id="max-score">5</span></p>
                    <p id="result-message">Good work!</p>
                </div>
                <button id="restart-btn">Restart Quiz</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
