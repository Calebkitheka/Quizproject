<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz App</title>
    <link rel="stylesheet" href="style.css"/>
</head>
<body>
    <div class="container">
        <div class="screen active" id="start-screen">
          <h1>Quiz time</h1>
          <p>Test your knowledge with quizzes</p>
          <button id="start-btn">Start Quiz</button>
        </div>

    <div class="screen" id="Quiz-screen">

        <div class="quiz-header">
          <h2 id="question-text">Question</h2>
          <div class="quiz-info">
            <p>
                Question <span id="curent-question">1</span> of <span id="total-questions">5</span>
            </p>

            
            <P>
              Score:<span id="Score">0</span>
            </P>
          </div>  
        </div>
      <div id="answers-container" class="answers-container">
      </div>

      <div class="progress-bar">
        <div id="progress" class="progress"></div>
      </div>
      </div>

      <div id="result-screen" class="screen">
        <h1>Quiz Results</h1>
        <div class="result-info">
          <P>You scored<span id="final-score">0</span>out of<span id="max-score">5</span></P>
        
        <div id="result-message">Good work</div>
        <div>
          <button id="restart-tn">Restart Quiz</button>
        </div>
        </div>
      </div>
    </div>
   <script src="script.js"> </script>
</body>
</html>
