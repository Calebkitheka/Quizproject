<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NurseQuiz - NCLEX Prep</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        
        <!-- START SCREEN -->
        <div id="start-screen" class="screen active">
            <h1>🩺 NurseQuiz</h1>
            <p>Master your nursing knowledge for NCLEX</p>
            
            <!-- Streak Display -->
            <div id="streak-display" class="streak-box">
                🔥 Streak: <span id="streak-count">0</span> days
            </div>
            
            <!-- High Score Display -->
            <p id="high-score-display" class="high-score">🏆 High Score: 0</p>
            
            <!-- Category Selection (Day 6) -->
            <div id="category-selection" class="category-selection">
                <label for="category-select">Choose Topic:</label>
                <select id="category-select">
                    <option value="all">📚 All Categories</option>
                    <option value="Vital Signs">Vital Signs</option>
                    <option value="Anatomy & Physiology">Anatomy & Physiology</option>
                    <option value="Nursing Process">Nursing Process</option>
                    <option value="Patient Safety">Patient Safety</option>
                    <option value="Infection Control">Infection Control</option>
                    <option value="Communication">Communication</option>
                    <option value="Medication Safety">Medication Safety</option>
                    <option value="Assessment">Assessment</option>
                </select>
            </div>
            
            <button id="start-btn">Start Quiz</button>
        </div>

        <!-- QUIZ SCREEN -->
        <div id="quiz-screen" class="screen">
            <div class="quiz-header">
                <div class="quiz-info">
                    <span id="current-question">Question 1</span>
                    <span>Score: <span id="score">0</span></span>
                </div>
                <!-- NEW: Timer Display (Day 7) -->
                <div class="timer-display">
                    ⏱️ <span id="timer">15</span>s
                </div>
            </div>
            
            <h2 id="question-text">Question goes here</h2>
            
            <div id="category-label" class="category-label"></div>
            
            <div id="answer-container" class="answers-container">
                <!-- Answer buttons inserted by JavaScript -->
            </div>

            <div id="explanation-box" class="explanation-box"></div>

            <div class="progress-bar">
                <div id="progress" class="progress"></div>
            </div>
        </div>

        <!-- RESULT SCREEN -->
        <div id="result-screen" class="screen">
            <div id="result-info">
                <h1>Quiz Results</h1>
                <div class="result-info">
                    <p>You scored <span id="final-score">0</span> out of <span id="max-score">50</span></p>
                    <p id="result-message">Good work!</p>
                </div>
                <button id="review-btn" class="review-btn">📖 Review Answers</button>
                <button id="restart-btn" class="restart-btn">🔄 Restart Quiz</button>
            </div>
        </div>

        <!-- REVIEW SCREEN (Day 5) -->
        <div id="review-screen" class="screen">
            <h1>📖 Question Review</h1>
            <p class="review-subtitle">Review all questions and explanations</p>
            
            <div id="review-container" class="review-container">
                <!-- Review items inserted by JavaScript -->
            </div>
            
            <button id="back-to-home-btn" class="home-btn">🏠 Back to Home</button>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
